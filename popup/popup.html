<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>poe.ninja → POE2 Trade</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <header class="popup__header">
      <div class="popup__logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <div class="popup__title">
        <h1>poe.ninja Trade</h1>
        <span class="popup__subtitle">POE2 Trade Search</span>
      </div>
    </header>

    <div class="divider"></div>

    <main class="popup__body">

      <!-- Liga -->
      <div class="setting-group">
        <label class="setting-label" for="league">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">
            <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          Liga activa
        </label>
        <div class="select-wrapper">
          <select id="league" class="setting-select">
            <option value="">Cargando ligas...</option>
          </select>
          <svg class="select-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      <!-- Tipo de listado -->
      <div class="setting-group">
        <label class="setting-label" for="listingType">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">
            <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          Tipo de listado
        </label>
        <div class="select-wrapper">
          <select id="listingType" class="setting-select">
            <option value="securable">Instant Buyout</option>
            <option value="available">Instant Buyout and In Person</option>
            <option value="onlineleague">In Person (Online in League)</option>
            <option value="online">In Person (Online)</option>
            <option value="any">Any</option>
          </select>
          <svg class="select-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      <!-- Idioma del sitio de Trade -->
      <div class="setting-group">
        <label class="setting-label" for="tradeLanguage">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
          </svg>
          Idioma del Trade
        </label>
        <div class="select-wrapper">
          <select id="tradeLanguage" class="setting-select">
            <option value="en">🇬🇧 English</option>
            <option value="es">🇪🇸 Español</option>
            <option value="de">🇩🇪 Deutsch</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="pt">🇧🇷 Português</option>
            <option value="ru">🇷🇺 Русский</option>
            <option value="ko">🇰🇷 한국어</option>
          </select>
          <svg class="select-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      <!-- Modo de búsqueda -->
      <div class="setting-group">
        <label class="setting-label">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/>
            <line x1="9" y1="12" x2="15" y2="12"/>
            <line x1="9" y1="16" x2="13" y2="16"/>
          </svg>
          Modo de búsqueda
        </label>
        <div class="radio-group">
          <label class="radio-option" id="mode-onlytype-label">
            <input type="radio" name="searchMode" value="only_type" id="mode-onlytype" checked />
            <span class="radio-custom"></span>
            <span class="radio-text">
              Por tipo
              <small>Busca por categoría (ej. Wand, Boots)</small>
            </span>
          </label>

          <label class="radio-option" id="mode-name-label">
            <input type="radio" name="searchMode" value="name" id="mode-name" />
            <span class="radio-custom"></span>
            <span class="radio-text">
              Solo nombre
              <small>Más rápido, menos preciso</small>
            </span>
          </label>
        </div>
      </div>

      <!-- Filtros automáticos del item -->
      <div class="setting-group setting-group--inline">
        <label class="setting-label" for="autoFilters">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
          </svg>
          Auto-filtros (iLvl, Stats)
        </label>
        <label class="toggle" id="auto-filters-toggle">
          <input type="checkbox" id="autoFilters" />
          <span class="toggle__track">
            <span class="toggle__thumb"></span>
          </span>
        </label>
      </div>

      <!-- Auto-abrir tab -->
      <div class="setting-group setting-group--inline">
        <label class="setting-label" for="autoOpen">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">
            <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
          </svg>
          Abrir tab automáticamente
        </label>
        <label class="toggle" id="auto-open-toggle">
          <input type="checkbox" id="autoOpen" />
          <span class="toggle__track">
            <span class="toggle__thumb"></span>
          </span>
        </label>
      </div>

    </main>

    <div class="divider"></div>

    <footer class="popup__footer">
      <div class="footer-left">
        <a href="https://adrianraineri.com" target="_blank" class="author-link">
          <span class="author-logo">[AR]</span>
          <span class="author-name">adrianraineri.com</span>
        </a>
        <span id="status-msg" class="status-msg"></span>
      </div>
      <span class="popup__version" id="version-display">v0.1.0</span>
    </footer>
  </div>

  <script src="version.js"></script>
  <script src="popup.js"></script>
</body>
</html>
